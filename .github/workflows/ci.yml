name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 🔍 Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: flake8 . --max-line-length=88 --exclude=__pycache__

  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t my-first-cicd .

      - name: Confirm image built
        run: docker images my-first-cicd

  deploy-staging:
    name: 🚧 Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Trigger staging deploy
        run: |
          echo "Deploying to STAGING environment..."
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}&env=staging" || echo "Hook not configured yet"

  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger production deploy
        run: |
          echo "Deploying to PRODUCTION environment..."
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "Hook not configured yet"